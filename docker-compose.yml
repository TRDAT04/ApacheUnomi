version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.10
    container_name: unomi-elasticsearch
    environment:
      - discovery.type=single-node
      - cluster.name=contextElasticSearch
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - D:/unomi-data/elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  unomi:
    image: apache/unomi:2.4.0
    container_name: apache-unomi
    environment:
      - UNOMI_ELASTICSEARCH_ADDRESSES=elasticsearch:9200
      - UNOMI_THIRDPARTY_PROVIDER1_IPADDRESSES=0.0.0.0/0,::1,127.0.0.1
    ports:
      - "8181:8181"
      - "9443:9443"
      - "8102:8102"
      - "5005:5005"
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - D:/unomi-data/unomi_deploy:/opt/apache-unomi/deploy