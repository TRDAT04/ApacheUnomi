
services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.10
    container_name: unomi-elasticsearch
    environment:
      - discovery.type=single-node
      - cluster.name=contextElasticSearch
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  unomi:
    image: apache/unomi:2.4.0
    container_name: apache-unomi
    environment:
      - UNOMI_ELASTICSEARCH_ADDRESSES=elasticsearch:9200
      - UNOMI_ALLOW_UNSECURE_REQUESTS=true
      - UNOMI_AUTHENTICATED_REST_ACCESS=*
      - UNOMI_THIRDPARTY_PROVIDER1_IPADDRESSES=0.0.0.0/0
    ports:
      - "8181:8181"
      - "9443:9443"
      - "8102:8102"
      - "5005:5005"
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      # Thả JAR vào D:\unomi-cdp-poc\deploy\ → Unomi tự hot-deploy
      # Yêu cầu: Docker Desktop → Settings → Resources → File sharing → thêm D:\
      - D:/unomi-cdp-poc/deploy:/opt/apache-unomi/deploy
      - unomi_data:/opt/apache-unomi/data
    healthcheck:
      # Unomi REST API sẵn sàng khi trả về 200 trên /cxs/profiles/count
      test: ["CMD-SHELL", "curl -fs -u karaf:karaf http://localhost:8181/cxs/profiles/count >/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s

volumes:
  elasticsearch_data:
    driver: local
  unomi_data:
    driver: local